name: publish-rubygems

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: "Guard: stable tags only for public release"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          if [[ "${version}" == *pre* ]]; then
            echo "Pre-release tags are not published to RubyGems from this workflow."
            exit 1
          fi
      - name: Publish gem to RubyGems
        uses: rubygems/release-gem@v1
