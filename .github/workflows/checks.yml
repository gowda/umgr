name: checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Rubocop
        run: bundle exec rubocop

  library-checks:
    runs-on: ubuntu-latest
    needs: rubocop
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: RSpec library checks
        env:
          SIMPLECOV_COMMAND_NAME: rspec-library
        run: bundle exec rspec --exclude-pattern "spec/cli/**/*_spec.rb"
      - name: Coverage summary (library)
        if: always()
        run: ruby scripts/ci/coverage_summary.rb "Library Coverage"
      - name: Upload coverage artifact (library)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-library
          path: coverage/

  cli-checks:
    runs-on: ubuntu-latest
    needs: rubocop
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: RSpec CLI checks
        env:
          SIMPLECOV_COMMAND_NAME: rspec-cli
        run: bundle exec rspec spec/cli
      - name: Coverage summary (cli)
        if: always()
        run: ruby scripts/ci/coverage_summary.rb "CLI Coverage"
      - name: Upload coverage artifact (cli)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cli
          path: coverage/
